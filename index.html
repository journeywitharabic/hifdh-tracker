function toHijri(d) {
  let y=d.getFullYear(),m=d.getMonth()+1,day=d.getDate();
  if(m<3){y--;m+=12;}
  const A=Math.floor(y/100),B=2-A+Math.floor(A/4);
  const JD=Math.floor(365.25*(y+4716))+Math.floor(30.6001*(m+1))+day+B-1524.5;
  const Z=Math.floor(JD+.5);let L=Z-1948440+10632;
  const N=Math.floor((L-1)/10631);L=L-10631*N+354;
  const J=Math.floor((10985-L)/5316)*Math.floor(50*L/17719)+Math.floor(L/5670)*Math.floor(43*L/15238);
  L=L-Math.floor((30-J)/15)*Math.floor(17719*J/50)-Math.floor(J/16)*Math.floor(15238*J/43)+29;
  return{y:30*N+J-30,m:Math.floor(24*L/709),d:L-Math.floor(709*Math.floor(24*L/709)/24)};
}

const gJ = p => { for(let i=JUZ.length-1;i>=0;i--) if(p>=JUZ[i]) return i+1; return 1; };

function ring(done,total,sz,lbl,col='#C8921A') {
  const r=(sz-9)/2, c=2*Math.PI*r, fill=total>0?Math.min(done/total,1)*c:0, fs=sz>80?'1.2rem':'0.85rem';
  return `<div class="ring-wrap" style="width:${sz}px;height:${sz}px;">
    <svg width="${sz}" height="${sz}">
      <circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="#DDD3A8" stroke-width="7"/>
      <circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="${col}" stroke-width="7"
        stroke-dasharray="${fill} ${c}" stroke-linecap="round"
        style="transform-origin:${sz/2}px ${sz/2}px;transform:rotate(-90deg)"/>
    </svg>
    <div class="ring-inner">
      <span class="ring-num" style="font-size:${fs}">${done}<span style="font-size:.62em;color:var(--brown);font-weight:400">/${total}</span></span>
      ${lbl?`<span class="ring-lbl">${lbl}</span>`:''}
    </div>
  </div>`;
}

    ${rH2.length?rH2.map(h=>hC(h,true)).join(''):eR}
    <button class="btn-secondary" onclick="oModal('recent')" style="border-color:var(--green2);color:var(--green2)">+ Add Recent Hifdh (already memorized)</button>
    ${gH.length?`<div class="deco-divider" style="margin:4px 0"><span class="deco-star">✦</span></div><div class="sect-label">Graduated to Queue (${gH.length})</div>${gH.map(h=>`<div class="card" style="opacity:.7;border-color:var(--green3);padding:10px 14px"><div style="display:flex;align-items:center;gap:8px"><span style="color:var(--green2)">✓</span><span style="font-family:'Amiri',serif;font-size:1rem;color:var(--green)">${su(h.surahAr)}</span><span style="font-size:.63rem;color:var(--brown);margin-left:auto">${h.graduatedAt?.split('T')[0]||''}</span></div></div>`).join('')}`:''}
  </div>`;
}

// ══════════════════════════════════════════════════════════
//  NOTES
// ══════════════════════════════════════════════════════════
function rN() {
  const sess=mkS(ST.queue), notes=[];
  Object.entries(ST.sData).forEach(([key,session])=>{
    const[iS,cS]=key.split('_'); const idx=parseInt(iS),cyc=parseInt(cS); const s=sess[idx]||[];
    Object.entries(session.slots||{}).forEach(([slotId,slot])=>{
      if(!slot.note?.trim()) return;
      const si=SL.find(x=>x.id===slotId); const pages=si?.sl?s.slice(...si.sl):s; const pg=pages[0];
      notes.push({date:slot.doneAt||session.startedAt,page:pg,surahAr:pg?gS(pg)[0]?.ar||'':'',context:`${si?.ar||slotId} · Cycle ${cyc}, S${idx+1}`,text:slot.note});
    });
  });
  notes.sort((a,b)=>new Date(b.date||0)-new Date(a.date||0));
  const nc=notes.length===0
    ?`<div class="card" style="text-align:center;padding:32px 20px;color:var(--brown)"><div style="font-size:2rem;margin-bottom:10px;color:var(--gold)">✎</div><div style="font-size:.9rem;margin-bottom:6px">No notes yet</div><div style="font-size:.74rem">Tap ✎ on any prayer slot to record weak spots or mutashabihat</div></div>`
    :notes.map(n=>`<div class="card"><div style="display:flex;align-items:center;gap:7px;margin-bottom:6px">${n.surahAr?`<span style="font-family:'Amiri',serif;font-size:.95rem;color:var(--green)">${su(n.surahAr)}</span>`:''} ${n.page?`<span class="badge">p.${n.page}</span>`:''}<span style="font-size:.6rem;color:#B0A070;margin-left:auto">${n.date?.split('T')[0]||''}</span></div><div style="font-size:.65rem;color:var(--gold);margin-bottom:6px;font-family:'Amiri',serif">${n.context}</div><div style="font-size:.82rem;color:var(--sepia);line-height:1.6">${n.text}</div></div>`).join('');
  return `<div class="view">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div><div style="font-family:'Amiri',serif;font-size:1.3rem;color:var(--green)">المُلَاحَظَاتْ</div><div style="color:var(--brown);font-size:.72rem;margin-top:1px">Notes · ${notes.length} recorded</div></div>
      <div style="display:flex;gap:6px">
        <button onclick="eNC()" style="background:var(--green);color:white;border:none;border-radius:18px;padding:6px 12px;font-size:.62rem;cursor:pointer;font-family:'Lora',serif">Notes CSV</button>
        <button onclick="eFC()" style="background:transparent;color:var(--green);border:1px solid var(--green);border-radius:18px;padding:6px 11px;font-size:.62rem;cursor:pointer;font-family:'Lora',serif">Full CSV</button>
      </div>
    </div>
    <div class="deco-divider"><span class="deco-star">✦</span></div>
    ${nc}
  </div>`;
}

// ══════════════════════════════════════════════════════════
//  MODAL
// ══════════════════════════════════════════════════════════
function oModal(cat){modalCat=cat;showAddModal=true;render();}
function cModal(){showAddModal=false;render();}
function rModal(){
  if(!showAddModal) return '';
  const iN=modalCat==='new';
  const opts=ALL_SURAHS.map(s=>`<option value="${s.n}">${s.n}. ${s.en} · ${s.ar}</option>`).join('');
  return `<div class="modal-overlay" onclick="if(event.target===this)cModal()">
    <div class="modal-box">
      <div style="margin-bottom:14px">
        <div style="font-family:'Amiri',serif;font-size:1.1rem;color:var(--green)">${iN?'الحِفْظُ الجَدِيدُ':'الحِفْظُ القَرِيبُ'}</div>
        <div style="font-size:.7rem;color:var(--brown)">${iN?'Pages you are actively memorizing':'Pages already memorized — entering 7-day review'}</div>
      </div>
      <label class="lbl">Surah</label>
      <select id="ms"><option value="">Select Surah</option>${opts}</select>
      <label class="lbl" style="margin-top:12px">Page Numbers (comma-separated)</label>
      <input type="text" id="mp" placeholder="e.g. 472, 473, 474"/>
      <div style="display:flex;gap:9px;margin-top:18px">
        <button onclick="cModal()" class="btn-secondary" style="margin-top:0">Cancel</button>
        <button onclick="subModal()" class="btn-primary" style="margin-top:0">Add Entry</button>
      </div>
    </div>
  </div>`;
}

// ══════════════════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════════════════
function render() {
  let c='';
  if(activeTab==='dashboard') c=rD();
  else if(activeTab==='today') c=rT();
  else if(activeTab==='hifdh') c=rH();
  else if(activeTab==='notes') c=rN();
  document.getElementById('main-content').innerHTML = c + rModal();
  document.getElementById('tab-bar').innerHTML = TABS.map(t=>
    `<button onclick="setTab('${t.id}')" class="${activeTab===t.id?'active':''}">
      <span class="tab-icon">${t.icon}</span>
      <span class="tab-lbl">${t.label}</span>
      ${activeTab===t.id?'<div class="tab-dot"></div>':'<div style="height:4px"></div>'}
    </button>`
  ).join('');
}

// ══════════════════════════════════════════════════════════
//  ACTIONS
// ══════════════════════════════════════════════════════════
function tSlot(id){setState(prev=>{const k=`${prev.sessionIdx}_${prev.cycle}`;const sd={...prev.sData};if(!sd[k])sd[k]={status:'in_progress',startedAt:new Date().toISOString(),slots:{}};const ex=sd[k].slots[id]||{done:false,note:''};sd[k]={...sd[k],slots:{...sd[k].slots,[id]:{...ex,done:!ex.done,doneAt:!ex.done?new Date().toISOString():null}}};return{...prev,sData:sd};});}
function tExp(id){expandedSlot=expandedSlot===id?null:id;render();}
function sNote(id){const t=document.getElementById(`note-${id}`)?.value||'';setState(prev=>{const k=`${prev.sessionIdx}_${prev.cycle}`;const sd={...prev.sData};if(!sd[k])sd[k]={status:'in_progress',startedAt:new Date().toISOString(),slots:{}};const ex=sd[k].slots[id]||{done:false};sd[k]={...sd[k],slots:{...sd[k].slots,[id]:{...ex,note:t}}};return{...prev,sData:sd};});}
function adv(status){setState(prev=>{const k=`${prev.sessionIdx}_${prev.cycle}`;const sd={...prev.sData,[k]:{...(prev.sData[k]||{slots:{}}),status,completedAt:new Date().toISOString()}};const s=mkS(prev.queue);const ni=prev.sessionIdx+1,wrap=ni>=s.length;return{...prev,sData:sd,sessionIdx:wrap?0:ni,cycle:wrap?prev.cycle+1:prev.cycle};});expandedSlot=null;setTab('dashboard');}
function goBack(){setState(prev=>({...prev,sessionIdx:Math.max(0,prev.sessionIdx-1)}));expandedSlot=null;}
function tRev(id,day){setState(prev=>({...prev,hifdh:prev.hifdh.map(h=>h.id!==id?h:{...h,reviews:{...h.reviews,[day]:{done:!(h.reviews[day]?.done),ts:!(h.reviews[day]?.done)?new Date().toISOString():null}}})}));}
function mMem(id){setState(prev=>({...prev,hifdh:prev.hifdh.map(h=>h.id!==id?h:{...h,memorized:true,memorizedAt:new Date().toISOString(),category:'recent'})}));}
function grad(id){setState(prev=>{const e=prev.hifdh.find(h=>h.id===id);if(!e)return prev;const ki=prev.queue.indexOf(293);const nq=[...prev.queue];if(ki>=0)nq.splice(ki,0,...e.pages);else nq.push(...e.pages);return{...prev,queue:nq,hifdh:prev.hifdh.map(h=>h.id!==id?h:{...h,graduated:true,graduatedAt:new Date().toISOString()})};});}
function subModal(){const sN=parseInt(document.getElementById('ms')?.value);const pS=document.getElementById('mp')?.value||'';const s=ALL_SURAHS.find(x=>x.n===sN);if(!s||!pS.trim())return;const pages=pS.split(',').map(p=>parseInt(p.trim())).filter(p=>!isNaN(p));if(!pages.length)return;const iN=modalCat==='new';const t=new Date().toISOString().split('T')[0];setState(prev=>({...prev,hifdh:[...prev.hifdh,{id:`h-${Date.now()}`,surahAr:s.ar,surahEn:s.en,surahN:s.n,pages,weekNum:prev.hifdh.filter(h=>!h.graduated).length+1,category:modalCat,startDate:t,endDate:new Date(Date.now()+6*864e5).toISOString().split('T')[0],memorized:!iN,memorizedAt:!iN?new Date().toISOString():null,reviews:{},graduated:false,graduatedAt:null}]}));showAddModal=false;}

// ══════════════════════════════════════════════════════════
//  CSV EXPORT
// ══════════════════════════════════════════════════════════
function eNC(){const sess=mkS(ST.queue);const rows=[['Date','Surah','Page','Context','Note']];Object.entries(ST.sData).forEach(([key,session])=>{const[iS,cS]=key.split('_');const idx=parseInt(iS),cyc=parseInt(cS);const s=sess[idx]||[];Object.entries(session.slots||{}).forEach(([slotId,slot])=>{if(!slot.note?.trim())return;const si=SL.find(x=>x.id===slotId);const pages=si?.sl?s.slice(...si.sl):s;const pg=pages[0];rows.push([slot.doneAt?.split('T')[0]||'',pg?su(gS(pg)[0]?.ar||''):'',pg||'',`${si?.en||slotId} C${cyc}S${idx+1}`,`"${(slot.note||'').replace(/"/g,'""')}"`]);});});dlC(rows,`hifdh-notes-${TODAY}.csv`);}
function eFC(){const sess=mkS(ST.queue);const rows=[['Session','Cycle','Pages','Status','Date','Slot','Done','Time','Note']];Object.entries(ST.sData).forEach(([key,session])=>{const[iS,cS]=key.split('_');const idx=parseInt(iS);const s=sess[idx]||[];const pages=s.length?`${s[0]}–${s[s.length-1]}`:'';Object.entries(session.slots||{}).forEach(([slotId,slot])=>{const si=SL.find(x=>x.id===slotId);rows.push([idx+1,cS,pages,session.status||'',session.startedAt?.split('T')[0]||'',si?.en||slotId,slot.done?'Yes':'No',slot.doneAt?.split('T')[1]?.split('.')[0]||'',`"${(slot.note||'').replace(/"/g,'""')}"`]);});});dlC(rows,`hifdh-full-${TODAY}.csv`);}
function dlC(rows,fn){const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([rows.map(r=>r.join(',')).join('\n')],{type:'text/csv'})),download:fn});a.click();}

// ══════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════
const now = new Date();
const hijri = toHijri(now);
document.getElementById('hdr-greg').textContent = now.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
document.getElementById('hdr-hijri').textContent = `${AR_DAYS[now.getDay()]} ${hijri.d} ${HM[hijri.m-1]} ${hijri.y} هـ`;

ST = loadSt() || mI();
render();
</script>
</body>
